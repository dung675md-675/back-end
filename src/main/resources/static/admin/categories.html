<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh mục - Secondhand Shop Admin</title>
    <!-- Thêm icon (optional, để trang trí menu) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <h1><i class='bx bxs-shopping-bag'></i> 2hand Admin</h1>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class='bx bx-home-alt nav-icon'></i> Tổng quan</a></li>
                    <li><a href="categories.html" class="active"><i class='bx bx-category nav-icon'></i> Danh mục</a></li>
                    <li><a href="products.html"><i class='bx bx-package nav-icon'></i> Sản phẩm</a></li>
                    <li><a href="orders.html"><i class='bx bx-cart nav-icon'></i> Đơn hàng</a></li>
                    <li><a href="customers.html"><i class='bx bx-user nav-icon'></i> Khách hàng</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" onclick="logoutAdmin()" class="logout-btn">
                    <i class='bx bx-log-out'></i> Đăng xuất
                </a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="content-header">
                <h1 class="page-title">Quản lý danh mục</h1>
            </div>
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Danh sách danh mục</h2>
                <button class="btn btn-primary" onclick="openCategoryModal()">
                    Thêm danh mục
                </button>
            </div>

            <!-- SEARCH -->
            <div class="form-group">
                <input type="text" 
                       id="searchInput" 
                       placeholder="Tìm kiếm danh mục..."
                       onkeyup="searchCategories()">
            </div>

            <!-- TABLE -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hình ảnh</th>
                            <th>Tên danh mục</th>
                            <th>Mô tả</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="categoriesTableBody">
                        <tr>
                            <td colspan="6" class="loading">
                                <div class="spinner"></div>
                                <p>Đang tải dữ liệu...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        </main>
    </div>

    <!-- MODAL ADD/EDIT CATEGORY -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Thêm danh mục mới</h2>
                <button class="close-btn" onclick="closeCategoryModal()">&times;</button>
            </div>
            <form id="categoryForm" class="modal-body" onsubmit="submitCategory(event)">
                <input type="hidden" id="categoryId">
                
                <div class="form-group">
                    <label for="categoryName">Tên danh mục <span style="color: red;">*</span></label>
                    <input type="text" 
                           id="categoryName" 
                           placeholder="Nhập tên danh mục" 
                           required>
                </div>

                <div class="form-group">
                    <label for="categoryDescription">Mô tả</label>
                    <textarea id="categoryDescription" 
                              placeholder="Nhập mô tả danh mục"></textarea>
                </div>

                <div class="form-group">
                    <label for="categoryImageUrl">URL hình ảnh</label>
                    <input type="text" 
                           id="categoryImageUrl" 
                           placeholder="https://example.com/image.jpg">
                </div>

                <div class="form-group">
                    <label for="categoryStatus">Trạng thái</label>
                    <select id="categoryStatus">
                        <option value="ACTIVE">Hoạt động</option>
                        <option value="INACTIVE">Không hoạt động</option>
                    </select>
                </div>

                <div class="modal-footer" style="padding: 1.5rem 2.5rem; background: #f8fafc; border-top: 1px solid var(--border-light); margin: 0 -2.5rem -2.5rem; border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg); display: flex; gap: 1rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeCategoryModal()" style="flex: 1;">Hủy</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Lưu danh mục</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/categories.js"></script>
</body>
</html>
